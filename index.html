<div class="wrapper">
  
    <div id="header">
      <h1 id="title">Balkan & Jugoslawien</h1>
        <p id="description">Hallo Schatz! Bitte fuell das folgende Formular aus.</p>
     </div>
    
   <div id="survey">
     <form id="survey-form">
      <div id="part1">
        <label required id="name-label">Name (Pflichtfeld)</label>
      <input type="text" required id="name" placeholder="Name">
      <label required id="email-label">E-mail (Pflichtfeld)</label>
      <input type="email" required id="email" placeholder="E-mail">
      <label id="number-label">Geburtsdatum (optional)</label>
      <input type="number" id="number" min = 1 max = 10; placeholder="Number">
      </div>
     
    <div id="part2">
     <label for="value" id="status">
        <b>Nationalitaet</b>
     <ul id="liste1">
         <li><input value="foreigner" id="auslaender" type="radio" name="status">Auslaender</li>
        <li><input value="partially" id="teilweise" type="radio" name="status">Jugoslawe</li>
      </label>
      </ul>
     </div>
     
     <div id="part3">
       <label for="dictator" id="tito"><b>In welchen jugoslawischen Republiken warst Du bereits?</b>
     <ul id="liste2">
         <li><input value="land1" type="checkbox" name="tito">Serbien</li>
        <li><input value="land2" type="checkbox" name="kroatien">Kroatien</li>
        <li><input value="land2" type="checkbox" name="slowenien">Slowenien</li>
        <li><input value="land2" type="checkbox" name="bosnien">Bosnien</li>
        <li><input value="land2" type="checkbox" name="montenegro">Montenegro</li>
        <li><input value="land2" type="checkbox" name="mazedonien">Mazedonien</li>
      </ul>
      </label>
     </div>
  
     <div id="part4">
       <label for="dropdown" id="wohnort"><b>Wo wohnst du?</b></label>
        <select id="dropdown">
          <option value="" selected disabled hidden>Bitte auswaehlen</option>  
          <option value="north-america">Nord-Amerika</option>
          <option value="south-america">Sued-Amerika</option>
          <option value="europe">Europa</option>
          <option value="asia">Asien</option>
          <option value="Africa">Afrika</option>
        </select>
      </div>
      
     <div id="part5">
       <label for="dropdown" id="balkan">Findest du den Balkan interessant?</label>
        <select id="dropdown2">
          <option value="" selected disabled hidden>Bitte auswaehlen</option>  
          <option value="Balkan1">Sehr uninteressant</option>                     <option value="Balkan2">Uninteressant</option>
          <option value="Balkan3">Neutral</option>
          <option value="Balkan4">Interessant</option>
          <option value="Balkan5">Sehr interessant</option>
      </select>
     </div>
      
     <div id="part6">  
      <label for="dropdown" id="jugoslawien"><b>Bewerte Jugoslawien?</b></label>
        <select id="dropdown3">
           <option value="" selected disabled hidden>Bitte auswaehlen</option>
          <option value="Jugo1">Sehr schlecht</option>       
          <option value="Jugo2">Schlecht</option>
          <option value="Jugo3">Ok</option>
          <option value="Jugo4">Gut</option>
          <option value="Jugo5">Sehr gut</option>
      </select> 
     </div>
     
     <div id="part7">
     <label id="comments"><b>Zusaetzliche Kommentare</b></label> 
     <textarea></textarea>
     <button type="submit" id="submit">Abschicken</button>
    </div>
    </form>
   </div>
